<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promoter Dashboard | Pacific iConnect</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #483ea8;
        --blue-gradient: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
        --text-dark: #1e293b;
        --text-muted: #64748b;
        --bg-body: #f8fafc;
        --white: #ffffff;
        --border: #e2e8f0;
        --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Roboto, sans-serif;
      }
      body {
        background-color: var(--bg-body);
        color: var(--text-dark);
      }

      /* --- HEADER --- */
      header {
        background: var(--white);
        padding: 12px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .brand-area {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .logo {
        font-weight: 900;
        font-size: 1.4rem;
        color: var(--primary);
      }
      .location {
        font-size: 0.85rem;
        color: #ef4444;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .profile-pill {
        background: #f1f5f9;
        padding: 5px 15px 5px 5px;
        border-radius: 30px;
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--border);
      }
      .profile-avatar {
        background: var(--primary);
        color: white;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
      }

      /* --- CONTENT CONTAINER --- */
      .container {
        max-width: 1300px;
        margin: 20px auto;
        padding: 0 20px;
      }

      /* --- SLIDER --- */
      .slider-box {
        width: 100%;
        height: 320px;
        border-radius: 24px;
        overflow: hidden;
        background: #ddd;
        margin-bottom: 30px;
        box-shadow: var(--shadow);
      }
      .slider-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* --- EARNINGS SECTION (PARALLEL ON ALL DEVICES) --- */
      .earnings-container {
        background: var(--white);
        border-radius: 20px;
        padding: 20px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        margin-bottom: 40px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        text-align: center;
      }
      .earn-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .earn-icon-box {
        width: 50px;
        height: 50px;
        background: var(--blue-gradient);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        color: white;
        box-shadow: 0 6px 15px rgba(37, 99, 235, 0.2);
      }
      .earn-info span {
        font-size: 0.75rem;
        color: var(--text-muted);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .earn-info b {
        font-size: 1.2rem;
        color: var(--text-dark);
        display: block;
        margin-top: 2px;
      }

      /* --- QUICK ACTIONS --- */
      .section-title {
        font-size: 1.4rem;
        font-weight: 800;
        margin-bottom: 20px;
        padding-left: 5px;
      }
      .actions-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
      }
      .action-card {
        background: white;
        border-radius: 18px;
        padding: 15px;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
        transition: 0.3s;
        cursor: pointer;
        box-shadow: var(--shadow);
      }
      .a-icon-circle {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
      }

      /* --- MOBILE RESPONSIVE --- */
      @media (max-width: 768px) {
        header {
          padding: 12px 15px;
        }
        .logo {
          font-size: 1.1rem;
        }
        .location,
        .profile-name {
          display: none;
        }
        .slider-box {
          height: 180px;
          border-radius: 16px;
        }

        /* Parallel icons on mobile */
        .earnings-container {
          padding: 15px 10px;
          gap: 5px;
        }
        .earn-icon-box {
          width: 42px;
          height: 42px;
          font-size: 1.1rem;
          border-radius: 10px;
        }
        .earn-info span {
          font-size: 0.6rem;
        }
        .earn-info b {
          font-size: 0.9rem;
        }

        .actions-grid {
          grid-template-columns: 1fr 1fr;
        }
        .action-card {
          padding: 12px;
          gap: 8px;
        }
        .action-card b {
          font-size: 0.8rem;
        }
        .action-card span {
          font-size: 0.65rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand-area">
        <div class="logo">
          PACIFIC <span style="color: #2563eb">iCONNECT</span>
        </div>
        <div class="location"><i class="fas fa-map-marker-alt"></i> SATARA</div>
      </div>
      <div class="profile-pill">
        <div class="profile-avatar">A</div>
        <span
          class="profile-name"
          style="font-size: 0.9rem; font-weight: 700; color: var(--primary)"
          >Aditi Ananda Patil</span
        >
      </div>
    </header>

    <div class="container">
      <div class="slider-box">
        <img
          src="https://i.ibb.co/L5B7ZpG/Refer-Earn-Banner.jpg"
          class="slider-img"
          alt="Banner"
        />
      </div>

      <div class="earnings-container">
        <div class="earn-item">
          <div class="earn-icon-box">
            <i class="fas fa-wallet" style="color: #ffd700"></i>
          </div>
          <div class="earn-info"><span>Wallet</span><b>₹ 1,250</b></div>
        </div>
        <div class="earn-item">
          <div class="earn-icon-box"><i class="fas fa-user-check"></i></div>
          <div class="earn-info"><span>Reg Today</span><b>45</b></div>
        </div>
        <div class="earn-item">
          <div class="earn-icon-box">
            <i class="fas fa-chart-line" style="color: #4ade80"></i>
          </div>
          <div class="earn-info"><span>Weekly</span><b>₹ 6,800</b></div>
        </div>
      </div>

      <h2 class="section-title">Quick Actions</h2>
      <div class="actions-grid">
        <div class="action-card">
          <div
            class="a-icon-circle"
            style="background: #fffbeb; color: #f59e0b"
          >
            <i class="fas fa-gift"></i>
          </div>
          <div class="a-text">
            <b>Refer & Earn</b><br /><span>Invite friends</span>
          </div>
        </div>
        <div class="action-card">
          <div
            class="a-icon-circle"
            style="background: #eff6ff; color: #3b82f6"
          >
            <i class="fas fa-bullhorn"></i>
          </div>
          <div class="a-text"><b>Promote</b><br /><span>Marketing</span></div>
        </div>
        <div class="action-card">
          <div
            class="a-icon-circle"
            style="background: #ecfdf5; color: #10b981"
          >
            <i class="fas fa-trophy"></i>
          </div>
          <div class="a-text">
            <b>Performance</b><br /><span>Rankings</span>
          </div>
        </div>
        <div class="action-card">
          <div
            class="a-icon-circle"
            style="background: #fef2f2; color: #ef4444"
          >
            <i class="fas fa-wallet"></i>
          </div>
          <div class="a-text"><b>My Wallet</b><br /><span>Balance</span></div>
        </div>
      </div>
    </div>
  </body>
</html>
