<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Beneficiary</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        margin: 0;
      }

      /* Container */
      .container {
        max-width: 1000px;
        margin: 40px auto;
        background: #fff;
        padding: 30px 40px;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
      }

      /* Header */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
      }

      .header h2 {
        margin: 0;
      }

      /* Dropdown */
      .select-box {
        width: 100%;
        margin-bottom: 20px;
      }

      select {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 15px;
      }

      /* Info box */
      .info-box {
        background: #eaf2fb;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }

      /* Form grid */
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      /* Full width */
      .full {
        grid-column: span 2;
      }

      /* Inputs */
      input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
      }

      /* Button */
      .btn {
        margin-top: 25px;
        width: 100%;
        padding: 14px;
        background: #3b5fbf;
        color: white;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        cursor: pointer;
      }

      .btn:hover {
        background: #2e4ca3;
      }

      /* Hide forms */
      .hidden {
        display: none;
      }

      .field {
    width: 100%;
}

.field input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}
input {
    box-sizing: border-box;  /* 🔥 VERY IMPORTANT */
}
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h2>Add New Beneficiary</h2>
      </div>

      <!-- Dropdown -->
      <div class="select-box">
        <select id="type" onchange="changeType()">
          <option value="">Select Beneficiary Type</option>
          <option value="bank">Add Bank Account</option>
          <option value="upi">Add UPI ID</option>
        </select>
      </div>

      <!-- BANK INFO -->
      <div id="bankInfo" class="info-box">
        <b>Bank Tips:</b>
        <ul>
          <li>Name should match bank account</li>
          <li>Check account number & IFSC</li>
          <li>Use active account only</li>
        </ul>
      </div>

      <!-- UPI INFO -->
      <div id="upiInfo" class="info-box">
        <b>UPI Tips:</b>
        <ul>
          <li>UPI must be active</li>
          <li>Avoid merchant UPI IDs</li>
        </ul>
      </div>

      <!-- BANK FORM -->
      <form id="bankForm" class="hidden">
        <div class="form-grid">
          <div class="field">
            <input type="text" placeholder="Account Holder Name" />
          </div>

          <div class="field">
            <input type="text" placeholder="Mobile Number" />
          </div>

          <div class="field">
            <input type="text" placeholder="Account Number" />
          </div>

          <div class="field">
            <input type="text" placeholder="Confirm Account Number" />
          </div>

          <div class="field full">
            <input type="text" placeholder="IFSC Code" />
          </div>
        </div>

        <button class="btn">Add Beneficiary</button>
      </form>

      <!-- UPI FORM -->
      <form id="upiForm" class="hidden">
        <div class="form-grid">
          <input type="text" placeholder="Name" />

          <input type="text" placeholder="Contact Number" />

          <input type="text" placeholder="UPI ID" class="full" />
        </div>

        <button class="btn">Add Beneficiary</button>
      </form>
    </div>

    <script>
      function changeType() {
        let type = document.getElementById("type").value;

        // hide all
        document.getElementById("bankForm").classList.add("hidden");
        document.getElementById("upiForm").classList.add("hidden");
        document.getElementById("bankInfo").style.display = "none";
        document.getElementById("upiInfo").style.display = "none";

        if (type === "bank") {
          document.getElementById("bankForm").classList.remove("hidden");
          document.getElementById("bankInfo").style.display = "block";
        }

        if (type === "upi") {
          document.getElementById("upiForm").classList.remove("hidden");
          document.getElementById("upiInfo").style.display = "block";
        }
      }
    </script>
  </body>
</html>
